# Настройки подключения базы данных
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Ожидание подключения базы данных без ошибок
      initialization-fail-timeout: -1
      connection-timeout: 30000

  # JPA свойства (ORM)
  jpa:
    # Не держать соединение с БД в течение всего запроса
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
    hibernate:
      # Создание базы данных автоматически после старта
      ddl-auto: update
    # Выполнение SQL-скриптов после создания базы данных
    defer-datasource-initialization: true

  # Настройки SQL
  sql:
    init:
      # Всегда выполнять SQL-скрипты на старте
      mode: always
