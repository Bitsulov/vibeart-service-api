spring:
  application:
    name: "vibeart-api"

  servlet:
    # Ограничения для составных запросов: Максимальный размер для файлов 25 МБ, для запросов - 30 МБ
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

  config:
    import:
      - optional:file:.env[.properties]
      - classpath:application-db.yml
      - classpath:application-logger.yml
      - classpath:application-swagger.yml
      - classpath:application-mb.yml
      - classpath:application-s3.yml

app:
  code-expiration-time: 15m
  allow-new-code-time: 2m
  jwt:
    secret: ${JWT_SECRET_KEY}
    access-token-validity: ${JWT_ACCESS_TIME}
    refresh-token-validity: ${JWT_REFRESH_TIME}


server:
  # Слушает любой адрес
  address: 0.0.0.0
